[filesystem]
read = [
    "/usr", "/lib", "/lib64", "/bin", "/etc", "/opt", "/proc",
    "/dev/zero", "/dev/urandom", "/dev/random", "/dev/tty", "/dev/pts",
]
write = [
    "/tmp", "/var/tmp",
    "/dev/null",
]
deny = ["/root", "/sys", "/proc/sys", "/etc/shadow", "/etc/sudoers", "/etc/sudoers.d", "/tmp/cc-run-bash-test-deny"]

[network]
allow = ["tcp://*:*", "udp://*:53", "icmp://*"]
